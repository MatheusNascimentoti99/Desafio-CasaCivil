name: Unit Tests

on:
  push

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      orders: ${{ steps.filter.outputs.orders }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'services/auth/**'
            orders:
              - 'services/orders/**'

  test:
    needs: changes
    if: ${{ needs.changes.outputs[matrix.service_key] == 'true' }}
    name: test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        include:
          - service: services/auth
            service_key: auth
          - service: services/orders
            service_key: orders

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q
        env:
          JWT_PRIVATE_KEY: ${{ matrix.service == 'services/auth' && secrets.JWT_PRIVATE_KEY || '' }}
          JWT_PUBLIC_KEY:  ${{ matrix.service == 'services/auth' && secrets.JWT_PUBLIC_KEY  || '' }}
