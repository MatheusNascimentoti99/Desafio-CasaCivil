name: Unit Tests

on:
  push

jobs:
  test:
    name: test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        service:
          - services/auth
          - services/orders

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q
        env:
          JWT_PRIVATE_KEY: ${{ matrix.service == 'services/auth' && secrets.JWT_PRIVATE_KEY || '' }}
          JWT_PUBLIC_KEY:  ${{ matrix.service == 'services/auth' && secrets.JWT_PUBLIC_KEY  || '' }}
