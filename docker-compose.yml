services:
  # ══════════════════════════════════════════════════════════════
  # DATABASES
  # ══════════════════════════════════════════════════════════════
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "${AUTH_DB_PORT:-5433}:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  orders-db:
    image: postgres:16-alpine
    container_name: orders-db
    environment:
      POSTGRES_USER: ${ORDERS_DB_USER}
      POSTGRES_PASSWORD: ${ORDERS_DB_PASSWORD}
      POSTGRES_DB: ${ORDERS_DB_NAME}
    ports:
      - "${ORDERS_DB_PORT:-5434}:5432"
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDERS_DB_USER} -d ${ORDERS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ══════════════════════════════════════════════════════════════
  # MICROSERVICES
  # ══════════════════════════════════════════════════════════════
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      DATABASE_URL: postgresql+asyncpg://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@auth-db:5432/${AUTH_DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    ports:
      - "8001:8001"
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  orders-service:
    build:
      context: ./services/orders
      dockerfile: Dockerfile
    container_name: orders-service
    environment:
      DATABASE_URL: postgresql+asyncpg://${ORDERS_DB_USER}:${ORDERS_DB_PASSWORD}@orders-db:5432/${ORDERS_DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
    ports:
      - "8002:8002"
    depends_on:
      orders-db:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════
  # API GATEWAY
  # ══════════════════════════════════════════════════════════════
  nginx:
    image: nginx:1.25-alpine
    container_name: api-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - orders-service
    networks:
      - backend
    restart: unless-stopped

volumes:
  auth_db_data:
  orders_db_data:

networks:
  backend:
    driver: bridge
