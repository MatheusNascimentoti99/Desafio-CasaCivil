version: "3.9"

services:
  # ══════════════════════════════════════════════════════════════
  # DATABASES
  # ══════════════════════════════════════════════════════════════
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  orders-db:
    image: postgres:16-alpine
    container_name: orders-db
    environment:
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: orders_pass
      POSTGRES_DB: orders_db
    ports:
      - "5434:5432"
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders_user -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ══════════════════════════════════════════════════════════════
  # MICROSERVICES
  # ══════════════════════════════════════════════════════════════
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      DATABASE_URL: postgresql+asyncpg://auth_user:auth_pass@auth-db:5432/auth_db
      SECRET_KEY: super-secret-key-change-in-production
    ports:
      - "8001:8001"
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  orders-service:
    build:
      context: ./services/orders
      dockerfile: Dockerfile
    container_name: orders-service
    environment:
      DATABASE_URL: postgresql+asyncpg://orders_user:orders_pass@orders-db:5432/orders_db
      SECRET_KEY: super-secret-key-change-in-production
    ports:
      - "8002:8002"
    depends_on:
      orders-db:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════
  # API GATEWAY
  # ══════════════════════════════════════════════════════════════
  nginx:
    image: nginx:1.25-alpine
    container_name: api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - orders-service
    networks:
      - backend
    restart: unless-stopped

volumes:
  auth_db_data:
  orders_db_data:

networks:
  backend:
    driver: bridge
