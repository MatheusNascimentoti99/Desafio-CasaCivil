services:
  # ══════════════════════════════════════════════════════════════
  # DATABASES
  # ══════════════════════════════════════════════════════════════
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "${AUTH_DB_PORT:-5433}:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  orders-db:
    image: postgres:16-alpine
    container_name: orders-db
    environment:
      POSTGRES_USER: ${ORDERS_DB_USER}
      POSTGRES_PASSWORD: ${ORDERS_DB_PASSWORD}
      POSTGRES_DB: ${ORDERS_DB_NAME}
    ports:
      - "${ORDERS_DB_PORT:-5434}:5432"
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDERS_DB_USER} -d ${ORDERS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ══════════════════════════════════════════════════════════════
  # CACHE
  # ══════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ══════════════════════════════════════════════════════════════
  # MICROSERVICES
  # ══════════════════════════════════════════════════════════════
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      AUTH_DB_USER: ${AUTH_DB_USER}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      AUTH_DB_NAME: ${AUTH_DB_NAME}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-RS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_TTL_AUTH: ${CACHE_TTL_AUTH:-600}
    ports:
      - "8001:8001"
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  orders-service:
    build:
      context: ./services/orders
      dockerfile: Dockerfile
    container_name: orders-service
    environment:
      ORDERS_DB_USER: ${ORDERS_DB_USER}
      ORDERS_DB_PASSWORD: ${ORDERS_DB_PASSWORD}
      ORDERS_DB_NAME: ${ORDERS_DB_NAME}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-RS256}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_TTL_ORDER: ${CACHE_TTL_ORDER:-60}
    ports:
      - "8002:8002"
    depends_on:
      orders-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════
  # FRONTENDS
  # ══════════════════════════════════════════════════════════════
  app-host:
    build:
      context: ./frontend/app-host
      dockerfile: ../Dockerfile
      args:
        VITE_ORDERS_MFE_URL: ${VITE_ORDERS_MFE_URL:-http://localhost:3001/assets/remoteEntry.js}
    container_name: app-host
    ports:
      - "${APP_HOST_PORT:-3000}:80"
    volumes:
      - ./frontend/app-host/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nginx
    networks:
      - frontend
    restart: unless-stopped

  mfe-orders:
    build:
      context: ./frontend/mfe-orders
      dockerfile: ../Dockerfile
    container_name: mfe-orders
    ports:
      - "${MFE_ORDERS_PORT:-3001}:80"
    volumes:
      - ./frontend/mfe-orders/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nginx
    networks:
      - frontend
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════
  # API GATEWAY
  # ══════════════════════════════════════════════════════════════
  nginx:
    image: nginx:1.25-alpine
    container_name: api-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - orders-service
    networks:
      - backend
    restart: unless-stopped

volumes:
  auth_db_data:
  orders_db_data:
  redis_data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
